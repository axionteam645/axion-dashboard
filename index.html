<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXION | Intelligent Layer for DeFi</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter;background:#050816;color:#fff}

/* NAV */
.nav{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;align-items:center;
padding:12px 20px;background:rgba(10,15,40,.85);
backdrop-filter:blur(12px);z-index:1000
}
.nav-links{display:flex;gap:16px;font-size:13px}
.nav-links a{color:#aaa;text-decoration:none}
#walletBtn{
padding:8px 12px;font-size:11px;border-radius:20px;
background:linear-gradient(90deg,#00c6ff,#ff00cc);border:none;color:#fff
}

/* MOBILE FIX */
@media(max-width:768px){
.nav-links{display:none}
#walletBtn{font-size:10px;padding:6px 10px}
}

/* HERO */
.hero{
padding-top:120px;
display:flex;justify-content:space-between;
align-items:center;padding:0 10%;min-height:100vh
}
.hero h1{font-size:46px}
.gradient{
background:linear-gradient(90deg,#00c6ff,#ff00cc);
-webkit-background-clip:text;color:transparent
}
.btn{padding:10px 18px;border-radius:20px;text-decoration:none;color:#fff}
.btn-buy{background:linear-gradient(90deg,#ff7a18,#ff00cc)}
.btn-secondary{background:#1b1f3a}

/* ICON */
.ax-icon{width:24px;height:24px;stroke:#00eaff;fill:none;stroke-width:2}

/* PANEL */
.panel{background:#11162b;padding:20px;border-radius:15px;width:300px}

/* WALLET */
.wallet{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}
.card{background:#11162b;padding:15px;border-radius:12px}

/* ROADMAP */
.phase{
padding:20px;border-radius:15px;margin-top:20px
}
.p1{background:#ff00cc22;box-shadow:0 0 20px #ff00cc55}
.p2{background:#00c6ff22;box-shadow:0 0 20px #00c6ff55}
.p3{background:#7cffcb22;box-shadow:0 0 20px #7cffcb55}

/* FOOTER FIX */
.footer{
display:flex;flex-wrap:wrap;gap:10px;
justify-content:center;padding:20px;font-size:12px;color:#888
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<strong>AXION</strong>

<div class="nav-links">
<a href="#home">Home</a>
<a href="#dashboard">Dashboard</a>
<a href="#roadmap">Roadmap</a>
<a href="#about">About</a>
</div>

<button id="walletBtn">Connect</button>
</div>

<!-- HERO -->
<section class="hero" id="home">

<div>
<h1>AXION is not just a token.</h1>
<p class="gradient">Intelligent Layer for DeFi</p>

<br>

<a class="btn btn-secondary" href="https://raw.githubusercontent.com/axionteam645/axion-dashboard/main/W1.pdf" target="_blank">Whitepaper</a>
<a class="btn btn-buy" href="#presale">BUY AX</a>
</div>

<div class="panel">
<h3>Ecosystem Balance</h3>
<p id="feeBalance">Loading...</p>
</div>

</section>

<!-- DASHBOARD -->
<section id="dashboard">

<h2>Wallet Lite</h2>

<div class="wallet">
<div class="card">AX <p id="ax">0</p></div>
<div class="card">BNB <p id="bnb">0</p></div>
<div class="card">USDT <p id="usdt">0</p></div>
</div>

</section>

<!-- ROADMAP -->
<section id="roadmap">

<h2>Roadmap</h2>

<div class="phase p1">Phase 1 - Foundation</div>
<div class="phase p2">Phase 2 - Growth</div>
<div class="phase p3">Phase 3 - Expansion</div>

</section>

<!-- PRESALE -->
<section id="presale">
<h2>Presale</h2>

<input id="bnbAmount" placeholder="Enter BNB">
<button onclick="buy()">Buy AX</button>

</section>

<!-- FOOTER -->
<div class="footer">
<span>AXION</span>
<span>Telegram</span>
<span>Twitter</span>
</div>

<script>

// UTM CLEAN
(function(){
const url=new URL(window.location);
url.searchParams.delete("utm_source");
window.history.replaceState({},document.title,url.pathname);
})();

// WALLET
let account;

async function connectWallet(){
if(window.ethereum){
const acc=await ethereum.request({method:'eth_requestAccounts'});
account=acc[0];
document.getElementById("walletBtn").innerText=account.slice(0,6)+"...";
}
}

document.getElementById("walletBtn").onclick=connectWallet;

// BUY
async function buy(){
const val=document.getElementById("bnbAmount").value;
await ethereum.request({
method:'eth_sendTransaction',
params:[{
from:account,
to:'0x570ecca843baa357502c1e24c508576cff49f47c',
value:(val*1e18).toString(16)
}]
});
}

</script>

</body>
</html>
