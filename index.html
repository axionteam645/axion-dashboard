<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AXION Dashboard</title>

<style>
body {
  margin:0;
  background:#050814;
  color:white;
  font-family:Arial;
  text-align:center;
}

.container {
  padding:50px;
}

.cards {
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
}

.card {
  padding:25px;
  width:250px;
  border-radius:15px;
}

.blue {border:1px solid #00d4ff; box-shadow:0 0 20px #00d4ff;}
.purple {border:1px solid #ff00ff; box-shadow:0 0 20px #ff00ff;}
.green {border:1px solid #00ff88; box-shadow:0 0 20px #00ff88;}
</style>

</head>

<body>

<div class="container">
<h1>AXION DASHBOARD</h1>

<div class="cards">

<div class="card blue">
<h3>Total Supply</h3>
<p id="supply">Loading...</p>
</div>

<div class="card purple">
<h3>Transfers</h3>
<p id="tx">Loading...</p>
</div>

<div class="card green">
<h3>Bot Status</h3>
<p id="status">OFF</p>
<button onclick="startBot()">Start</button>
<button onclick="stopBot()">Stop</button>
</div>

</div>
</div>

<script>
const CONTRACT="0x0F18990414D8f58890301ded2C371F2619C67896";
const API_KEY="UCM1QBCHACQYG1UE5M6IYR5MX5Z2P94UZQ";

async function load(){
let s=await fetch(`https://api.bscscan.com/api?module=stats&action=tokensupply&contractaddress=${CONTRACT}&apikey=${API_KEY}`);
let sd=await s.json();
document.getElementById("supply").innerText=(sd.result/1e18).toLocaleString();

let t=await fetch(`https://api.bscscan.com/api?module=account&action=tokentx&contractaddress=${CONTRACT}&apikey=${API_KEY}`);
let td=await t.json();
document.getElementById("tx").innerText=td.result.length;
}

function startBot(){document.getElementById("status").innerText="ON";}
function stopBot(){document.getElementById("status").innerText="OFF";}

load();
</script>

</body>
</html>
