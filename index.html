<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXION Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: radial-gradient(circle at top, #0b1220, #02040a);
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
}

/* HEADER */
.header {
  padding: 30px 20px 10px;
}

.logo {
  width: 90px;
  margin-bottom: 10px;
}

.title {
  font-size: 36px;
  font-weight: bold;
  background: linear-gradient(90deg, #00d4ff, #ff00ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* CARDS */
.container {
  max-width: 1100px;
  margin: 40px auto;
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
}

.card {
  padding: 30px;
  border-radius: 20px;
  background: rgba(10,15,40,0.7);
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* COLORS */
.blue {
  border: 1px solid #00d4ff;
  box-shadow: 0 0 25px rgba(0,212,255,0.3);
}

.purple {
  border: 1px solid #ff00ff;
  box-shadow: 0 0 25px rgba(255,0,255,0.3);
}

.green {
  border: 1px solid #00ff88;
  box-shadow: 0 0 25px rgba(0,255,136,0.3);
}

.card h3 {
  margin-bottom: 15px;
  font-size: 20px;
}

.value {
  font-size: 28px;
  font-weight: bold;
}

/* BUTTON */
button {
  margin: 5px;
  padding: 10px 15px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  background: #111;
  color: white;
}

button:hover {
  background: #222;
}
</style>

</head>
<body>

<div class="header">
  <!-- BURAYA LOGO URL KOY -->
  <img src="https://static.wixstatic.com/media/48edb0_2bca8a5dc388426cb3443fec0178276e~mv2.jpeg" class="logo">

  <div class="title">AXION DASHBOARD</div>
</div>

<div class="container">

  <!-- TOTAL SUPPLY -->
  <div class="card blue">
    <h3>Total Supply</h3>
    <div class="value">1,000,000,000</div>
  </div>

  <!-- TRANSFERS -->
  <div class="card purple">
    <h3>Transfers</h3>
    <div class="value" id="tx">Loading...</div>
  </div>

  <!-- BOT -->
  <div class="card green">
    <h3>Bot Status</h3>
    <div class="value" id="status">OFF</div>

    <div style="margin-top:10px;">
      <button onclick="startBot()">Start</button>
      <button onclick="stopBot()">Stop</button>
    </div>
  </div>

</div>

<script>
const CONTRACT = "0x0F18990414D8f58890301ded2C371F2619C67896";
const API_KEY = "UCM1QBCHACQYG1UE5M6IYR5MX5Z2P94UZQ";

/* TRANSFER SAYISI */
async function loadTransfers() {
  try {
    const res = await fetch(
      `https://api.bscscan.com/api?module=account&action=tokentx&contractaddress=${CONTRACT}&apikey=${API_KEY}`
    );

    const data = await res.json();

    if (data && Array.isArray(data.result)) {
      document.getElementById("tx").innerText =
        data.result.length.toLocaleString();
    } else {
      document.getElementById("tx").innerText = "0";
    }

  } catch {
    document.getElementById("tx").innerText = "0";
  }
}

/* BOT */
function startBot() {
  document.getElementById("status").innerText = "ON";
}

function stopBot() {
  document.getElementById("status").innerText = "OFF";
}

/* LOAD */
loadTransfers();
</script>

</body>
</html>
