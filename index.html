<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXION | Intelligent Layer for DeFi</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: 'Inter', sans-serif;
    background:#05070d;
    color:white;
}

/* MOBILE FIXES */
@media (max-width:768px){

    /* Karşılama kutusu kaldırıldı */
    #welcomeModal {
        display:none !important;
    }

    /* Add AX kaldırıldı */
    #addTokenBtn {
        display:none !important;
    }

}

/* Basit stil */
.container{
    padding:20px;
}

.btn{
    background:linear-gradient(90deg,#00f0ff,#ff00ff);
    padding:12px 18px;
    border-radius:10px;
    border:none;
    color:white;
    font-weight:600;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- WELCOME MODAL -->
<div id="welcomeModal">
    <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;">
        <div style="background:#0c111f;padding:30px;border-radius:16px;text-align:center;">
            <h2>Welcome to AXION</h2>
            <p>Intelligent Layer for DeFi</p>
            <button class="btn" onclick="closeModal()">Enter</button>
        </div>
    </div>
</div>

<div class="container">

<h1>AXION Dashboard</h1>

<button class="btn">Connect Wallet</button>

<!-- ADD TOKEN -->
<button id="addTokenBtn" class="btn">Add AX to Wallet</button>

</div>

<script>
function closeModal(){
    document.getElementById("welcomeModal").style.display="none";
}
</script>

</body>
</html>
